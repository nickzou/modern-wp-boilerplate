---

- name: Create certbot secrets directory
  ansible.builtin.file:
    path: /etc/letsencrypt/secrets
    state: directory
    owner: root
    group: root
    mode: '0700'
  become: yes

- name: Create Digital Ocean API credentials file
  ansible.builtin.copy:
    content: |
      dns_digitalocean_token = {{ do_token }}
    dest: /etc/letsencrypt/secrets/digitalocean.cfg
    owner: root
    group: root
    mode: '0600'
  become: yes

- name: Obtain wildcard SSL certificate
  ansible.builtin.shell:
    cmd: >
      certbot certonly --dns-digitalocean
      --dns-digitalocean-credentials /etc/letsencrypt/secrets/digitalocean.cfg
      -d "*.{{ domain_name }}"
      -d "{{ domain_name }}"
      --email {{ ssl_email }}
      --agree-tos
      --non-interactive
  register: certbot_result
  become: yes

- name: Set up automatic SSL certificate renewal cron job
  ansible.builtin.cron:
    name: "Certbot SSL renewal"
    minute: "0"
    hour: "0"
    job: "certbot renew --quiet --post-hook 'docker-compose -f /opt/wordpress/docker-compose.yml restart nginx'"
    user: root
  become: yes

- name: Ensure docker-compose services are running with new certificates
  ansible.builtin.shell:
    cmd: docker-compose down && docker-compose up -d
    chdir: /opt/wordpress
  become: yes
