---

- name: Stop nginx container to free up port 80
  ansible.builtin.shell:
    cmd: docker-compose stop nginx
    chdir: /opt/wordpress
  become: yes

- name: Obtain SSL certificates with retry
  ansible.builtin.shell:
    cmd: >
      certbot certonly --standalone 
      -d {{ domain_name }} 
      -d www.{{ domain_name }} 
      -d staging.{{ domain_name }} 
      --email {{ ssl_email }} 
      --agree-tos 
      --non-interactive
  register: certbot_result
  until: certbot_result.rc == 0
  retries: 10
  delay: 30
  become: yes

- name: Restart docker-compose services
  ansible.builtin.shell:
    cmd: docker-compose up -d
    chdir: /opt/wordpress
  become: yes

- name: Set up automatic SSL certificate renewal cron job
  ansible.builtin.cron:
    name: "Certbot SSL renewal"
    minute: "0"
    hour: "0"
    job: "certbot renew --quiet --post-hook 'docker exec wordpress_nginx nginx -s reload'"
    user: root
  become: yes
