name: Hello World Workflow

on:
    pull_request:
        types: [closed]
        branches: [main]
    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

jobs:
    check-host:
        runs-on: ubuntu-latest
        if: github.event.pull_request.merged == true
        outputs:
            env_ready: ${{ steps.ping-check.outputs.env_ready }}
        steps:
          - name: Check if deployment environment is ready
            id: check-env
            run: |
              if timeout 10 ssh -o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=no -T automator@$SSH_HOST 2>/dev/null; then
                echo "SSH connection successful, environment is ready for deployment"
                echo "env_ready=true" >> $GITHUB_OUTPUT
              else
                echo "Cannot establish SSH connection, environment may not be ready"
                echo "env_ready=false" >> $GITHUB_OUTPUT
              fi
            env:
              SSH_HOST: ${{ secrets.SSH_HOST }}
    build-and-deploy:
        needs: check-env
        runs-on: ubuntu-latest
        if: needs.check-host.outputs.env_ready == 'true'
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"
                  cache: "npm"

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.2"
                  tools: composer:v2
                  coverage: none

            - name: Install Node dependencies
              run: |
                  npm install

            - name: Install PHP dependencies
              run: |
                  npm run composer:install:dev
                  npm run composer:install:theme

            - name: Build assets
              run: |
                  npm run prod

            - name: Deploy artifact
              run: |
                  mkdir -p ~/.ssh
                  chmod 700 ~/.ssh
                  cat > ~/.ssh/automator << 'EOL'
                  ${{ secrets.AUTOMATOR_SSH_PRIVATE_KEY }}
                  EOL
                  chmod 600 ~/.ssh/automator
                  ssh-keyscan $ssh_host >> ~/.ssh/known_hosts
                  chmod 600 ~/.ssh/known_hosts
                  eval "$(ssh-agent -s)"
                  ssh-add ~/.ssh/automator
                  rsync -vzcr --rsync-path="sudo rsync" web/wp-content automator@$ssh_host:/opt/wordpress/wordpress/production
                  ssh automator@$ssh_host "sudo chown -R www-data:www-data /opt/wordpress/wordpress/production"
              env:
                  ssh_host: ${{ secrets.SSH_HOST }}
