name: Hello World Workflow

on:
  # Triggers the workflow on push events
  push:
    branches:
      - "deployment-action"
  pull_request:
    types: [ closed ]
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # if: github.event.pull_request.merged == true
    
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'npm'
        
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install Node dependencies
        run: |
          npm install

      - name: Install PHP dependencies
        run: |
          npm run composer:install:dev
          npm run composer:install:theme

      - name: Build assets
        run: |
          npm run prod 

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.AUTOMATOR_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh -T automator@${{ secrets.SSH_HOST }} "echo 'SSH connection successful!'"

      - name: Deploy artifact
        run: |
          rsync -vzcr --rsync-path="sudo rsync" automator@${{ secrets.SSH_HOST }}:/opt/wordpress/wordpress/production
          ssh automator@${{ secrest.SSH_HOST }} "sudo chown -R www-data:www-data /opt/wordpress/wordpress/production"

      # Runs a simple echo command
      - name: Say hello
        run: echo "Hello, specific branch!"
        
      # Optional: Display the time as well
      - name: Display the time
        run: |
          echo "The time is:"
          date
